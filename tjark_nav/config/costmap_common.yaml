# Shared costmap parameters loaded into both global and local namespaces.

# Robot footprint (metres).  Derived from URDF wheel/caster geometry:
#   width  ≈ 0.40 m (left_wheel y=+0.192, right_wheel y=-0.192, body margin)
#   length ≈ 0.40 m (casters at x=±0.138, body margin)
footprint: [[ 0.22,  0.22],
            [ 0.22, -0.22],
            [-0.22, -0.22],
            [-0.22,  0.22]]
footprint_padding: 0.03

# Inflation around obstacles.  Dynamic pedestrians need a larger buffer than
# static walls because they can move laterally into the robot's path.
inflation_radius:    1.00
cost_scaling_factor: 2.0

# Obstacle detection layer – laser only (no depth camera for 2-D nav).
obstacle_range:   6.0   # mark obstacles within this range
raytrace_range:   7.0   # clear free space up to this range

map_type: costmap

observation_sources: laser_scan_sensor

laser_scan_sensor:
  sensor_frame:  laser
  data_type:     LaserScan
  topic:         /scan
  marking:       true
  clearing:      true
  min_obstacle_height: 0.05
  max_obstacle_height: 2.0
