# AMCL – Adaptive Monte Carlo Localisation
# Frames must match tjark_agv URDF and diff-drive plugin settings.

# ── motion model (differential drive) ───────────────────────────────────────
odom_model_type:  diff
odom_alpha1:      0.2     # rotation noise from rotation
odom_alpha2:      0.2     # rotation noise from translation
odom_alpha3:      0.2     # translation noise from translation
odom_alpha4:      0.2     # translation noise from rotation
odom_frame_id:    odom
base_frame_id:    base_link
global_frame_id:  map

# ── particle filter ──────────────────────────────────────────────────────────
min_particles:          500
max_particles:          3000
kld_err:                0.05
kld_z:                  0.99
resample_interval:      1
transform_tolerance:    0.2
recovery_alpha_slow:    0.001
recovery_alpha_fast:    0.1

# ── sensor model (likelihood field) ─────────────────────────────────────────
laser_model_type:           likelihood_field
laser_max_beams:            60
laser_min_range:            0.12
laser_max_range:            20.0
laser_z_hit:                0.5
laser_z_short:              0.05
laser_z_max:                0.05
laser_z_rand:               0.5
laser_sigma_hit:            0.2
laser_lambda_short:         0.1
laser_likelihood_max_dist:  2.0

# ── filter update thresholds ─────────────────────────────────────────────────
update_min_d:   0.15     # metres between filter updates
update_min_a:   0.15     # radians between filter updates

# ── initial pose covariance ──────────────────────────────────────────────────
initial_cov_xx: 0.25
initial_cov_yy: 0.25
initial_cov_aa: 0.0685   # (π/12)²
